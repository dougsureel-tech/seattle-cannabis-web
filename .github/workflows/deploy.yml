# ════════════════════════════════════════════════════════════════════════
# REDUNDANT AS OF 2026-05-08 — Sea public site uses Vercel-native GitHub
# integration. Push trigger DISABLED to stop duplicating deploys.
#
# The seattle-cannabis-web Vercel project is directly connected to this
# GitHub repo (Settings → Git on the Vercel UI). Vercel auto-deploys on
# every push to main without ever touching GH Actions. Running this
# workflow on push triggered THREE deploys per commit hash (Vercel-native
# + this CLI deploy + a third path), which Shohei Maeda (Vercel Compute,
# Tokyo) flagged as billing waste in 2026-05-07 advisory.
#
# Estimated savings: 30-50% off build-minutes (per Shohei's audit).
#
# This file is kept as a manual-trigger backup in case the Vercel-native
# integration ever needs a fallback. Trigger via:
#   gh workflow run Deploy --ref main
# Deletion candidate at next cleanup pass once integration is confirmed
# stable for ~1 week (i.e., after 2026-05-15).
#
# History:
#   - 2026-05-05: Created — `push: branches: [main]` auto-deploy (mirror of inv Seattle)
#   - 2026-05-08 ~11:10 PT: push trigger removed; Vercel-native is the canonical deploy path
#
# Required secrets (only needed if anyone manually triggers via gh CLI):
#   VERCEL_TOKEN — create at https://vercel.com/account/tokens (scope: full account)
#
# Project IDs are not secrets and live in env. Org is dougsureel's team
# `team_BLtIFVlMFAktBg7mSnPWwZml`.

name: Deploy

on:
  # push: branches: [main] — DISABLED 2026-05-08; Vercel-native auto-deploy
  # is the canonical path. Re-enable only if native integration breaks.
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_BLtIFVlMFAktBg7mSnPWwZml
  VERCEL_PROJECT_ID: prj_TtN8ta5VggsWt1Jq6amI672Aa4UL

concurrency:
  # Newer push cancels in-flight build — only the latest commit ships.
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: vercel deploy --prod (seattle-cannabis-web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm before Node so setup-node can use the corepack-style cache
      # if it wants. Pinned to v10 to match pnpm-lock.yaml's lockfile
      # version (Vercel autodetects v10 based on project creation date).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Pin vercel CLI — `@latest` (53.1.1, rolled out ~2026-05-04 19:30 PT)
      # crashes during prebuilt upload with `Error: Upload aborted` deep in
      # chunk-SPXTKMOV.js retries logic. v4.125 (19:28 PT) was the last
      # green deploy on @latest; every push since has died at upload.
      # 52.0.0 is the immediately-prior stable; deploys ran clean on it
      # for weeks. Belt-and-suspenders: `--archive=tgz` switches the upload
      # path to a single tarball POST instead of per-file streaming, which
      # is the documented workaround for transient upload-aborts.
      - name: Install Vercel CLI
        run: npm install --global vercel@52.0.0

      - name: Pull production env from Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
