# Auto-deploys seattle-cannabis-web (Vercel project `seattle-cannabis-web`)
# on every push to `main`. Mirrors the inventoryapp Seattle workflow added
# in v6.217.
#
# Required GitHub secret:
#   VERCEL_TOKEN — create at https://vercel.com/account/tokens
#
# Project IDs are not secrets and live in env. Org is dougsureel's team
# `team_BLtIFVlMFAktBg7mSnPWwZml`.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_BLtIFVlMFAktBg7mSnPWwZml
  VERCEL_PROJECT_ID: prj_TtN8ta5VggsWt1Jq6amI672Aa4UL

concurrency:
  # Newer push cancels in-flight build — only the latest commit ships.
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: vercel deploy --prod (seattle-cannabis-web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm before Node so setup-node can use the corepack-style cache
      # if it wants. Pinned to v10 to match pnpm-lock.yaml's lockfile
      # version (Vercel autodetects v10 based on project creation date).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production env from Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
